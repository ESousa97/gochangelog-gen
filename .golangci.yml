version: 2

run:
  timeout: 5m

linters:
  enable:
    - bodyclose
    - contextcheck
    - dupl
    - durationcheck
    - errname
    - errorlint
    - exhaustive
    - goconst
    - gocritic
    - godot
    - gosec
    - misspell
    - nilerr
    - noctx
    - prealloc
    - predeclared
    - revive
    - sqlclosecheck
    - unconvert
    - unparam
    - wastedassign
    - copyloopvar
    - dupword
    - mirror
    - perfsprint
    - sloglint
    - testifylint

linters-settings:
  misspell:
    locale: US
    ignore-words:
      - correspondente
      - Comando
      - comandos
      - profissional
  gocritic:
    enabled-tags:
      - diagnostic
      - style
      - performance
    disabled-checks:
      - hugeParam
  revive:
    rules:
      - name: exported
        arguments:
          - "checkPrivateReceivers"
      - name: unexported-return
        disabled: true
  govet:
    enable-all: true
  errcheck:
    check-type-assertions: true
    check-blank: true
  exhaustive:
    default-signifies-exhaustive: true

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - dupl
        - goconst
        - gosec
        - errcheck
  max-issues-per-linter: 0
  max-same-issues: 0

output:
  format: colored-line-number
  sort-results: true
