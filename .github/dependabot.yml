version: 2
updates:
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
    allow:
      - dependency-type: "all"
    groups:
      go-dependencies:
        update-types:
          - "minor"
          - "patch"
    open-pull-requests-limit: 10
    rebase-strategy: "auto"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      actions-dependencies:
        update-types:
          - "minor"
          - "patch"
    open-pull-requests-limit: 10
    rebase-strategy: "auto"
